<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ADRO Wyckoff · The Breakout</title>
    <!-- Phaser 3 (CDN) -->
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #0b0f19;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', system-ui, sans-serif;
        }
        #game-container {
            border-radius: 20px;
            box-shadow: 0 0 40px rgba(0, 255, 170, 0.15);
            overflow: hidden;
            border: 1px solid #1e2a3a;
        }
        /* fallback jika canvas belum tampil */
        #game-container canvas {
            display: block;
            background: #0f172a;
        }
    </style>
</head>
<body>
<div id="game-container"></div>

<script>
    // ========== KONFIGURASI GAME ==========
    const config = {
        type: Phaser.AUTO,
        width: 800,
        height: 600,
        parent: 'game-container',
        backgroundColor: '#0f172a',
        physics: {
            default: 'arcade',
            arcade: {
                gravity: { y: 0 },
                debug: false
            }
        },
        scene: {
            preload: preload,
            create: create,
            update: update
        }
    };

    const game = new Phaser.Game(config);

    // ========== VARIABEL GLOBAL ==========
    let elephant;             // Gajah Emas (smart money)
    let rocket;               // Roket markup
    let cursors;
    let fireKey;
    let moneyBalls;           // grup bola uang hijau
    let lastFired = 0;
    let wall;                 // dinding resistance
    let wallText;
    let retailRobots;         // robot ritel (static group)

    let supplyLots = 500000;  // total lot jualan ritel
    let supplyText;
    let phaseText;
    let isBreakout = false;   // status markup

    // ========== PRELOAD ==========
    function preload() {
        // --- Gajah Emas (Smart Money) ---
        let gfx = this.make.graphics({ add: false });
        gfx.fillStyle(0xd4af37, 1); 
        gfx.fillRoundedRect(0, 10, 80, 50, 12);
        gfx.fillStyle(0x00ff7f, 1);
        gfx.fillRect(20, 10, 40, 15);
        gfx.fillStyle(0xd4af37, 1);
        gfx.fillRect(75, 20, 15, 25);
        gfx.generateTexture('elephantKey', 95, 60);
        gfx.destroy();

        // --- Bola Uang Hijau (amunisi) ---
        gfx = this.make.graphics({ add: false });
        gfx.fillStyle(0x00ff88, 1);
        gfx.fillCircle(10, 10, 10);
        gfx.generateTexture('moneyKey', 20, 20);
        gfx.destroy();

        // --- Robot Ritel (penjaga) ---
        gfx = this.make.graphics({ add: false });
        gfx.fillStyle(0xef4444, 1);
        gfx.fillRect(5, 5, 30, 30);
        gfx.fillStyle(0xffffff, 1);
        gfx.fillRect(10, 10, 6, 6);
        gfx.fillRect(24, 10, 6, 6);
        gfx.fillStyle(0x000000, 1);
        gfx.fillRect(12, 12, 2, 2);
        gfx.fillRect(26, 12, 2, 2);
        gfx.generateTexture('robotKey', 40, 40);
        gfx.destroy();

        // --- Roket Markup (transformasi) ---
        gfx = this.make.graphics({ add: false });
        gfx.fillStyle(0x00ffcc, 1);
        gfx.fillTriangle(20, 0, 0, 40, 40, 40);
        gfx.fillStyle(0xff6600, 1);
        gfx.fillRect(10, 40, 20, 15);
        gfx.generateTexture('rocketKey', 40, 55);
        gfx.destroy();
    }

    // ========== CREATE ==========
    function create() {
        // ---- Background grid ----
        const grid = this.add.graphics();
        grid.lineStyle(1, 0x1e293b, 0.6);
        for (let i = 0; i <= 800; i += 40) grid.lineBetween(i, 0, i, 600);
        for (let j = 0; j <= 600; j += 40) grid.lineBetween(0, j, 800, j);

        // ---- Dinding Resistance (Rp2.350) ----
        wall = this.add.container(400, 130);
        const wallBg = this.add.graphics();
        wallBg.fillStyle(0x7f1d1d, 0.85);
        wallBg.lineStyle(4, 0xef4444, 1);
        wallBg.fillRoundedRect(-260, -35, 520, 70, 12);
        wallBg.strokeRoundedRect(-260, -35, 520, 70, 12);
        wallText = this.add.text(0, -6, 'RESISTANCE WALL: Rp2.350 - Rp2.400', {
            fontSize: '20px',
            fontWeight: '700',
            fill: '#ffffff',
            fontFamily: 'monospace'
        }).setOrigin(0.5);
        wall.add([wallBg, wallText]);
        this.physics.world.enable(wall);
        wall.body.setImmovable(true);
        wall.body.setAllowGravity(false);

        // ---- Robot Ritel (penjaga di atas dinding) ----
        retailRobots = this.physics.add.staticGroup({
            defaultKey: 'robotKey',
            maxSize: 20
        });
        for (let x = 180; x <= 620; x += 55) {
            const robot = retailRobots.create(x, 70, 'robotKey');
            robot.setScale(0.9);
            robot.refreshBody();
        }

        // ---- Gajah Emas (pemain) ----
        elephant = this.physics.add.sprite(400, 520, 'elephantKey');
        elephant.setCollideWorldBounds(true);
        elephant.setScale(1.1);

        // ---- Roket (tersembunyi, akan muncul saat breakout) ----
        rocket = this.physics.add.sprite(400, 520, 'rocketKey');
        rocket.setVisible(false);
        rocket.setActive(false);
        rocket.setCollideWorldBounds(false);

        // ---- Amunisi: Bola Uang Hijau ----
        moneyBalls = this.physics.add.group({
            defaultKey: 'moneyKey',
            maxSize: 40,
            runChildUpdate: true
        });

        // ---- Kontrol keyboard ----
        cursors = this.input.keyboard.createCursorKeys();
        fireKey = this.input.keyboard.addKey(Phaser.Input.Keyboard.KeyCodes.SPACE);

        // ---- HUD ----
        supplyText = this.add.text(20, 20, 'OFFER SUPPLY: 500.000 LOT', {
            fontSize: '20px',
            fill: '#ff6b6b',
            fontFamily: 'monospace',
            fontWeight: 'bold'
        });
        phaseText = this.add.text(480, 22, 'WYCKOFF: PHASE C (ACCUMULATION)', {
            fontSize: '16px',
            fill: '#cbd5e1',
            fontWeight: '600'
        });

        // ---- Info kontrol ----
        this.add.text(400, 575, '← →  gerak  |  [SPASI]  tembak bola uang (beli)', {
            fontSize: '14px',
            fill: '#94a3b8',
            fontFamily: 'monospace'
        }).setOrigin(0.5);

        // ---- Tabrakan bola ↔ dinding ----
        this.physics.add.overlap(moneyBalls, wall, hitWall, null, this);
        // bola dengan robot (efek visual, tidak menghancurkan robot)
        this.physics.add.overlap(moneyBalls, retailRobots, (ball, robot) => {
            // hanya efek kecil: bola hilang, robot tetap
            if (ball.active) {
                ball.setActive(false);
                ball.setVisible(false);
                ball.body.velocity.y = 0;
            }
        }, null, this);
    }

    // ========== UPDATE ==========
    function update(time) {
        // --- Jika sudah breakout, roket terbang ---
        if (isBreakout) {
            rocket.setVelocityY(-320);
            if (rocket.y < -60) {
                rocket.y = 650;
                rocket.setVelocityY(-320);
            }
            return; // semua kontrol dinonaktifkan saat breakout
        }

        // --- Gerak Gajah ---
        if (cursors.left.isDown) {
            elephant.setVelocityX(-260);
        } else if (cursors.right.isDown) {
            elephant.setVelocityX(260);
        } else {
            elephant.setVelocityX(0);
        }

        // --- Tembak (SPASI) ---
        if (fireKey.isDown && time > lastFired) {
            const ball = moneyBalls.get(elephant.x, elephant.y - 35);
            if (ball) {
                ball.setActive(true);
                ball.setVisible(true);
                ball.body.velocity.y = -520;
                ball.body.velocity.x = 0;
                lastFired = time + 150; // cooldown
            }
        }

        // --- Bersihkan bola yang keluar layar (atas) ---
        moneyBalls.children.each((b) => {
            if (b.active && b.y < -20) {
                b.setActive(false);
                b.setVisible(false);
                b.body.velocity.y = 0;
            }
        });
    }

    // ========== FUNGSI TABRAKAN DINDING ==========
    function hitWall(ball, wallObj) {
        if (!ball.active) return;

        // nonaktifkan bola
        ball.setActive(false);
        ball.setVisible(false);
        ball.body.velocity.y = 0;

        // kurangi supply
        if (supplyLots > 0) {
            supplyLots = Math.max(0, supplyLots - 12500);
            supplyText.setText('OFFER SUPPLY: ' + supplyLots.toLocaleString('id-ID') + ' LOT');
            this.cameras.main.shake(80, 0.004);
        }

        // ---- CEK BREAKOUT (supply habis) ----
        if (supplyLots <= 0 && !isBreakout) {
            isBreakout = true;

            // hancurkan robot-robot
            retailRobots.clear(true, true);

            // hancurkan dinding dengan animasi
            this.tweens.add({
                targets: wall,
                alpha: 0,
                scaleY: 0.1,
                duration: 280,
                ease: 'Power2',
                onComplete: () => {
                    wall.destroy();
                }
            });

            // sembunyikan gajah, aktifkan roket
            elephant.setVisible(false);
            elephant.setActive(false);
            elephant.body.velocity.x = 0;

            rocket.setPosition(elephant.x, elephant.y);
            rocket.setVisible(true);
            rocket.setActive(true);
            rocket.setVelocityY(-320);

            // update HUD
            supplyText.setText('🔥 SUPPLY DEPLETED! RARE ASSET 🔥');
            supplyText.setFill('#00ff88');
            phaseText.setText('🚀 WYCKOFF: PHASE D & E (MARKUP Rp2.600)');
            phaseText.setFill('#00ffff');
            phaseText.setX(440);
        }
    }
</script>
</body>
</html>
