<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ADRO Wyckoff Battle - The Breakout</title>
    <!-- Memuat Library Phaser 3 via CDN Resmi -->
    <script src="https://jsdelivr.net"></script>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #0b0f19;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
        }
        #game-container {
            box-shadow: 0 10px 30px rgba(0, 255, 128, 0.2);
            border-radius: 12px;
            overflow: hidden;
        }
    </style>
</head>
<body>

    <div id="game-container"></div>

    <script>
        // Konfigurasi Utama Game Phaser
        const config = {
            type: Phaser.AUTO,
            width: 800,
            height: 600,
            parent: 'game-container',
            backgroundColor: '#0f172a',
            physics: {
                default: 'arcade',
                arcade: {
                    gravity: { y: 0 },
                    debug: false
                }
            },
            scene: {
                preload: preload,
                create: create,
                update: update
            }
        };

        const game = new Phaser.Game(config);

        // Global Game Variables
        let elephant;
        let rocket;
        let cursors;
        let fireButton;
        let moneyBalls;
        let lastFired = 0;
        let wall;
        let wallText;
        let retailRobots;
        
        let supplyLots = 500000; // Total awal lot jualan ritel
        let supplyText;
        let phaseText;
        let isBreakout = false;

        function preload() {
            // Pembuatan aset grafis internal tanpa file external gambar
            
            // 1. Membuat Gajah Emas (Smart Money)
            let gajahGraphics = this.make.graphics({ x: 0, y: 0, add: false });
            gajahGraphics.fillStyle(0xd4af37, 1); 
            gajahGraphics.fillRoundedRect(0, 10, 80, 50, 10);
            gajahGraphics.fillStyle(0x00ff7f, 1); 
            gajahGraphics.fillRect(20, 10, 40, 15);
            gajahGraphics.fillStyle(0xd4af37, 1);
            gajahGraphics.fillRect(75, 20, 15, 25); 
            gajahGraphics.generateTexture('elephantKey', 95, 60);

            // 2. Membuat Bola Uang Hijau (Hajar Kanan)
            let moneyGraphics = this.make.graphics({ x: 0, y: 0, add: false });
            moneyGraphics.fillStyle(0x00ff88, 1); 
            moneyGraphics.fillCircle(10, 10, 10);
            moneyGraphics.generateTexture('moneyKey', 20, 20);

            // 3. Membuat Robot Ritel Nyangkut
            let robotGraphics = this.make.graphics({ x: 0, y: 0, add: false });
            robotGraphics.fillStyle(0xef4444, 1); 
            robotGraphics.fillRect(5, 5, 30, 30);
            robotGraphics.fillStyle(0xffffff, 1); 
            robotGraphics.fillRect(10, 10, 6, 6);
            robotGraphics.fillRect(24, 10, 6, 6);
            robotGraphics.fillStyle(0x000000, 1);
            robotGraphics.fillRect(12, 12, 2, 2);
            robotGraphics.fillRect(26, 12, 2, 2);
            robotGraphics.generateTexture('robotKey', 40, 40);

            // 4. Membuat Roket Markup
            let rocketGraphics = this.make.graphics({ x: 0, y: 0, add: false });
            rocketGraphics.fillStyle(0x00ffcc, 1); 
            rocketGraphics.fillTriangle(20, 0, 0, 40, 40, 40);
            rocketGraphics.fillStyle(0xff6600, 1); 
            rocketGraphics.fillRect(10, 40, 20, 15);
            rocketGraphics.generateTexture('rocketKey', 40, 55);
        }

        function create() {
            // 1. Latar Belakang Kotak Grafik (Chart Grid)
            let grid = this.add.graphics();
            grid.lineStyle(1, 0x1e293b, 1);
            for (let i = 0; i < 800; i += 40) { grid.lineBetween(i, 0, i, 600); }
            for (let j = 0; j < 600; j += 40) { grid.lineBetween(0, j, 800, j); }

            // 2. Membuat Tembok Resistance Rp2.350
            wall = this.add.container(400, 120);
            let wallBackground = this.add.graphics();
            wallBackground.fillStyle(0x7f1d1d, 0.8); 
            wallBackground.lineStyle(4, 0xef4444, 1);  
            wallBackground.fillRoundedRect(-250, -30, 500, 60, 8);
            wallBackground.strokeRoundedRect(-250, -30, 500, 60, 8);
            
            wallText = this.add.text(0, -10, 'RESISTANCE WALL: Rp2.350 - Rp2.400', { 
                fontSize: '18px', 
                fontWeight: 'bold',
                fill: '#ffffff' 
            }).setOrigin(0.5);
            
            wall.add([wallBackground, wallText]);
            this.physics.world.enable(wall);
            wall.body.setImmovable(true);

            // 3. Membuat Robot Ritel di Atas Dinding
            retailRobots = this.physics.add.staticGroup();
            for (let x = 200; x <= 600; x += 60) {
                retailRobots.create(x, 60, 'robotKey');
            }

            // 4. Karakter Gajah Emas
            elephant = this.physics.add.sprite(400, 520, 'elephantKey');
            elephant.setCollideWorldBounds(true);

            // 5. Karakter Roket (Hidden)
            rocket = this.physics.add.sprite(400, 520, 'rocketKey');
            rocket.setVisible(false);
            rocket.setActive(false);

            // 6. Grup Amunisi Bola Uang
            moneyBalls = this.physics.add.group({
                defaultKey: 'moneyKey',
                maxSize: 30
            });

            // 7. Input Keyboard Controls
            cursors = this.input.keyboard.createCursorKeys();
            fireButton = this.input.keyboard.addKey(Phaser.Input.Keyboard.KeyCodes.SPACE);

            // 8. Tampilan Layar HUD Informasi Saham
            supplyText = this.add.text(20, 20, 'OFFER SUPPLY: 500.000 LOT', { 
                fontSize: '20px', 
                fill: '#ff4444', 
                fontFamily: 'monospace',
                fontWeight: 'bold'
            });

            phaseText = this.add.text(520, 20, 'WYCKOFF: PHASE C (ACCUMULATION)', { 
                fontSize: '16px', 
                fill: '#e2e8f0',
                fontWeight: 'bold'
            });

            this.add.text(400, 575, 'Gunakan [PANAH KIRI/KANAN] untuk bergerak | [SPASI] untuk Hajar Kanan (Beli)', { 
                fontSize: '14px', 
                fill: '#94a3b8' 
            }).setOrigin(0.5);

            // 9. Deteksi Tabrakan
            this.physics.add.overlap(moneyBalls, wall, hitWall, null, this);
        }

        function update(time) {
            if (isBreakout) {
                rocket.setVelocityY(-400);
                if (rocket.y < -50) { rocket.y = 650; }
                return;
            }

            if (cursors.left.isDown) {
                elephant.setVelocityX(-250);
            } else if (cursors.right.isDown) {
                elephant.setVelocityX(250);
            } else {
                elephant.setVelocityX(0);
            }

            if (fireButton.isDown && time > lastFired) {
                let ball = moneyBalls.get(elephant.x, elephant.y - 30);
                if (ball) {
                    ball.setActive(true);
                    ball.setVisible(true);
                    ball.body.velocity.y = -500; 
                    lastFired = time + 150; 
                }
            }

            moneyBalls.children.each(function(b) {
                if (b.active && b.y < 0) {
                    b.setActive(false);
                    b.setVisible(false);
                }
            });
        }

        function hitWall(ball, wallObject) {
            if (!ball.active) return;
            
            ball.setActive(false);
            ball.setVisible(false);
            ball.body.velocity.y = 0;

            if (supplyLots > 0) {
                supplyLots -= 12500; 
                if (supplyLots < 0) supplyLots = 0;
                supplyText.setText('OFFER SUPPLY: ' + supplyLots.toLocaleString('id-ID') + ' LOT');
                this.cameras.main.shake(100, 0.003);
            }

            if (supplyLots <= 0 && !isBreakout) {
                isBreakout = true;
                retailRobots.clear(true, true);
                
                this.tweens.add({
                    targets: wall,
                    alpha: 0,
                    scaleY: 0,
                    duration: 300,
                    onComplete: () => { wall.destroy(); }
                });

                elephant.setVisible(false);
                elephant.setActive(false);
                
                rocket.setPosition(elephant.x, elephant.y);
                rocket.setVisible(true);
                rocket.setActive(true);

                supplyText.setText('SUPPLY DEPLETED! RARE ASSET 🔥');
                supplyText.setFill('#00ff88');
                
                phaseText.setText('WYCKOFF: PHASE D & E (MARKUP RP2.600) 🚀');
                phaseText.setFill('#00ffff');
            }
        }
    </script>
</body>
</html>
